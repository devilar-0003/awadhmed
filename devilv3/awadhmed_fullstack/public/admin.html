<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AwadhMed — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--primary:#1a56c4;--bg:#f0f2f8;--surface:#fff;--text:#1a1a2e;--muted:#9aa5b4;--border:#e2e8f0;--sidebar:260px;--error:#e74c3c;--success:#27ae60}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:linear-gradient(180deg,#0f1729 0%,#1a1a2e 100%);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sidebar-brand{padding:20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.brand-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#9a7530);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.brand-text{color:#f5e6a3;font-size:17px;font-weight:700;letter-spacing:.5px}
.brand-badge{background:rgba(201,168,76,.2);color:var(--gold);font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:1px;margin-top:1px}
.nav-section{padding:12px 16px 4px;font-size:9px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:2px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 16px;color:rgba(255,255,255,0.6);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left}
.nav-item i{width:18px;text-align:center}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,0.08);color:#fff}
.nav-item.active{background:rgba(26,86,196,0.3);border-left:3px solid var(--primary)}
.nav-badge{background:var(--error);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:auto}
.main{margin-left:var(--sidebar);flex:1}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:17px;font-weight:700}
.content{padding:24px}
/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;padding:20px;border:1px solid var(--border);display:flex;align-items:center;gap:14px}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.si-blue{background:#e8f0fe;color:var(--primary)}
.si-gold{background:#fff8e1;color:var(--gold)}
.si-green{background:#e6f9f0;color:var(--success)}
.si-red{background:#fef0f0;color:var(--error)}
.si-purple{background:#f3e8ff;color:#7c3aed}
.si-teal{background:#e0f7fa;color:#00796b}
.stat-num{font-size:24px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
/* Section */
.section{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.section-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-body{padding:20px}
/* Table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;background:#fafbff}
.data-table td{padding:12px 14px;border-bottom:1px solid #f5f7fb;font-size:13px;vertical-align:middle}
.data-table tr:last-child td{border:none}
.data-table tr:hover td{background:#fafbff}
/* Buttons */
.btn{border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--primary),#0d3a8f);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,86,196,0.3)}
.btn-success{background:#e6f9f0;color:var(--success);border:1px solid #a3e6c5}
.btn-danger{background:#fef0f0;color:var(--error);border:1px solid #fcc}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:11px}
/* Badge */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600}
.b-blue{background:#e8f0fe;color:var(--primary)}
.b-green{background:#e6f9f0;color:var(--success)}
.b-gold{background:#fff8e1;color:#9a7530}
.b-red{background:#fef0f0;color:var(--error)}
.b-gray{background:#f5f7fb;color:var(--muted)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.modal-head h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
.modal-body{padding:24px}
.modal-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
/* Form */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text);margin-bottom:5px;letter-spacing:.03em;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* Search bar */
.search-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);background:#fafbff}
.search-bar input,.search-bar select{padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:12px;font-family:'Inter',sans-serif;outline:none;background:#fff}
.search-bar input{flex:1;min-width:180px}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
      <div><div class="brand-text">AwadhMed</div><div class="brand-badge">ADMIN PANEL</div></div>
    </div>
    <div style="padding:8px 0;flex:1">
      <div class="nav-section">Overview</div>
      <button class="nav-item active" data-view="dashboard" onclick="showView('dashboard')"><i class="fas fa-tachometer-alt"></i> Dashboard</button>
      <div class="nav-section">Management</div>
      <button class="nav-item" data-view="users" onclick="showView('users')"><i class="fas fa-users"></i> Users</button>
      <button class="nav-item" data-view="doctors" onclick="showView('doctors')"><i class="fas fa-user-md"></i> Doctors</button>
      <button class="nav-item" data-view="medicines" onclick="showView('medicines')"><i class="fas fa-pills"></i> Medicines</button>
      <div class="nav-section">Transactions</div>
      <button class="nav-item" data-view="bookings" onclick="showView('bookings')"><i class="fas fa-calendar-check"></i> Bookings <span class="nav-badge" id="navBookings">0</span></button>
      <button class="nav-item" data-view="orders" onclick="showView('orders')"><i class="fas fa-shopping-bag"></i> Orders <span class="nav-badge" id="navOrders">0</span></button>
      <div class="nav-section">Content</div>
      <button class="nav-item" data-view="blog" onclick="showView('blog')"><i class="fas fa-blog"></i> Blog Posts</button>
      <button class="nav-item" data-view="notices" onclick="showView('notices')"><i class="fas fa-bell"></i> Notices</button>
      <button class="nav-item" data-view="schemes" onclick="showView('schemes')"><i class="fas fa-hand-holding-heart"></i> Schemes</button>
      <button class="nav-item" data-view="contacts" onclick="showView('contacts')"><i class="fas fa-envelope"></i> Messages <span class="nav-badge" id="navContacts">0</span></button>
      <div style="margin-top:auto;padding:12px 0;border-top:1px solid rgba(255,255,255,0.08)">
        <a href="/" class="nav-item" style="text-decoration:none"><i class="fas fa-home"></i> View Site</a>
        <button class="nav-item" onclick="doLogout()" style="color:rgba(245,90,90,0.8)"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:12px;color:var(--muted)" id="adminName"></span>
        <button class="btn btn-outline btn-sm" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Generic Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head"><h3 id="modalTitle">—</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<script>
let TOKEN = null, USER = null, STATS = {};

(function init() {
  TOKEN = localStorage.getItem('am_token');
  USER  = JSON.parse(localStorage.getItem('am_user') || 'null');
  if (!TOKEN || !USER || USER.role !== 'admin') {
    alert('Admin access only.'); return window.location.href = '/auth.html';
  }
  document.getElementById('adminName').textContent = USER.name;
  showView('dashboard');
})();

async function api(method, path, body) {
  const r = await fetch(`/api${path}`, {
    method, headers:{'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function setActiveNav(view) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  const titles = {dashboard:'Dashboard',users:'Users',doctors:'Doctors',medicines:'Medicines',bookings:'Bookings',orders:'Orders',blog:'Blog Posts',notices:'Notices',schemes:'Govt Schemes',contacts:'Contact Messages'};
  document.getElementById('pageTitle').textContent = titles[view] || view;
}

async function showView(view) {
  setActiveNav(view);
  const c = document.getElementById('content');
  c.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)"><i class="fas fa-circle-notch fa-spin" style="font-size:28px"></i></div>';
  try {
    switch(view) {
      case 'dashboard':  await renderDashboard(); break;
      case 'users':      await renderUsers(); break;
      case 'doctors':    await renderDoctors(); break;
      case 'medicines':  await renderMedicines(); break;
      case 'bookings':   await renderBookings(); break;
      case 'orders':     await renderOrders(); break;
      case 'blog':       await renderBlog(); break;
      case 'notices':    await renderNotices(); break;
      case 'schemes':    await renderSchemes(); break;
      case 'contacts':   await renderContacts(); break;
    }
  } catch(err) {
    c.innerHTML = `<div style="background:#fef0f0;color:var(--error);padding:20px;border-radius:12px">Error: ${err.message}</div>`;
  }
}

// ── Dashboard ────────────────────────────────────────────
async function renderDashboard() {
  const stats = await api('GET','/admin/stats');
  STATS = stats;
  document.getElementById('navBookings').textContent = stats.bookings;
  document.getElementById('navOrders').textContent   = stats.orders;
  if(document.getElementById('navContacts')) document.getElementById('navContacts').textContent = stats.contacts||0;
  document.getElementById('content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon si-blue"><i class="fas fa-users"></i></div><div><div class="stat-num">${stats.users}</div><div class="stat-lbl">Total Users</div></div></div>
      <div class="stat-card"><div class="stat-icon si-green"><i class="fas fa-user-md"></i></div><div><div class="stat-num">${stats.doctors}</div><div class="stat-lbl">Doctors</div></div></div>
      <div class="stat-card"><div class="stat-icon si-gold"><i class="fas fa-calendar-check"></i></div><div><div class="stat-num">${stats.bookings}</div><div class="stat-lbl">Bookings</div></div></div>
      <div class="stat-card"><div class="stat-icon si-purple"><i class="fas fa-shopping-bag"></i></div><div><div class="stat-num">${stats.orders}</div><div class="stat-lbl">Orders</div></div></div>
      <div class="stat-card"><div class="stat-icon si-teal"><i class="fas fa-pills"></i></div><div><div class="stat-num">${stats.medicines}</div><div class="stat-lbl">Medicines</div></div></div>
      <div class="stat-card"><div class="stat-icon si-red"><i class="fas fa-rupee-sign"></i></div><div><div class="stat-num">₹${stats.bookingRevenue + stats.orderRevenue}</div><div class="stat-lbl">Total Revenue</div></div></div>
      <div class="stat-card" style="cursor:pointer" onclick="showView('schemes')"><div class="stat-icon" style="background:rgba(99,179,115,0.12);color:#63b373"><i class="fas fa-hand-holding-heart"></i></div><div><div class="stat-num">${stats.schemes||0}</div><div class="stat-lbl">Active Schemes</div></div></div>
      <div class="stat-card" style="cursor:pointer" onclick="showView('contacts')"><div class="stat-icon" style="background:rgba(245,160,80,0.12);color:#f5a050"><i class="fas fa-envelope"></i></div><div><div class="stat-num">${stats.contacts||0}</div><div class="stat-lbl">New Messages</div></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="section">
        <div class="section-head"><span class="section-title">Revenue Breakdown</span></div>
        <div class="section-body">
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span>Booking Revenue</span><strong style="color:var(--primary)">₹${stats.bookingRevenue}</strong></div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span>Order Revenue</span><strong style="color:var(--success)">₹${stats.orderRevenue}</strong></div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-size:15px"><span>Total</span><strong style="color:var(--text)">₹${stats.bookingRevenue + stats.orderRevenue}</strong></div>
        </div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">Quick Actions</span></div>
        <div class="section-body" style="display:flex;flex-direction:column;gap:10px">
          <button class="btn btn-primary" onclick="showView('doctors')"><i class="fas fa-user-md"></i> Manage Doctors</button>
          <button class="btn btn-outline" onclick="showView('bookings')"><i class="fas fa-calendar-check"></i> View Bookings</button>
          <button class="btn btn-outline" onclick="showView('orders')"><i class="fas fa-shopping-bag"></i> View Orders</button>
          <button class="btn btn-outline" onclick="openBlogCreate()"><i class="fas fa-plus"></i> New Blog Post</button>
        </div>
      </div>
    </div>`;
}

// ── Users ────────────────────────────────────────────────
async function renderUsers() {
  const users = await api('GET','/admin/users');
  document.getElementById('content').innerHTML = `
    <div class="section">
      <div class="section-head"><span class="section-title"><i class="fas fa-users" style="color:var(--primary)"></i> Users (${users.length})</span></div>
      <div class="search-bar"><input type="text" id="userSearch" placeholder="Search users…" oninput="filterTable('userTbody', this.value, [0,1,2])"></div>
      <table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Phone</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody id="userTbody">
        ${users.map(u=>`<tr>
          <td><strong>${u.name}</strong></td>
          <td>${u.email}</td>
          <td><span class="badge ${{admin:'b-red',doctor:'b-blue',patient:'b-green'}[u.role]||'b-gray'}">${u.role}</span></td>
          <td>${u.phone||'—'}</td>
          <td>${new Date(u.createdAt).toLocaleDateString('en-IN')}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteUser('${u._id}','${u.name}')"><i class="fas fa-trash"></i></button></td>
        </tr>`).join('')}
      </tbody></table>
    </div>`;
}

async function deleteUser(id, name) {
  if (!confirm(`Delete user "${name}"?`)) return;
  await api('DELETE',`/admin/users/${id}`);
  showView('users');
}

// ── Doctors ──────────────────────────────────────────────
async function renderDoctors() {
  const docs = await api('GET','/admin/doctors');
  document.getElementById('content').innerHTML = `
    <div class="section">
      <div class="section-head"><span class="section-title"><i class="fas fa-user-md" style="color:var(--primary)"></i> Doctors (${docs.length})</span><button class="btn btn-primary" onclick="openDoctorModal()"><i class="fas fa-plus"></i> Add Doctor</button></div>
      <table class="data-table"><thead><tr><th>Name</th><th>Specialty</th><th>Hospital</th><th>Fee</th><th>Rating</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${docs.map(d=>`<tr>
          <td><div style="display:flex;align-items:center;gap:8px"><img src="${d.photo||'https://i.pravatar.cc/32'}" style="width:32px;height:32px;border-radius:50%;object-fit:cover"><strong>${d.name}</strong></div></td>
          <td>${d.specialty}</td>
          <td>${d.hospital}</td>
          <td style="font-weight:700;color:var(--primary)">₹${d.fee}</td>
          <td>⭐ ${d.rating}</td>
          <td><span class="badge ${d.available?'b-green':'b-red'}">${d.available?'Active':'Inactive'}</span></td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="openDoctorModal(${JSON.stringify(d).replace(/"/g,'&quot;')})"><i class="fas fa-edit"></i></button>
            <button class="btn btn-danger btn-sm" onclick="deleteDoctor('${d._id}')"><i class="fas fa-trash"></i></button>
          </td>
        </tr>`).join('')}
      </tbody></table>
    </div>`;
}

function openDoctorModal(doc) {
  const isEdit = !!doc;
  document.getElementById('modalTitle').textContent = isEdit ? 'Edit Doctor' : 'Add Doctor';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-row">
      <div class="form-group"><label>Full Name</label><input id="dName" value="${doc?.name||''}"></div>
      <div class="form-group"><label>Specialty</label><input id="dSpec" value="${doc?.specialty||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Hospital</label><input id="dHosp" value="${doc?.hospital||''}"></div>
      <div class="form-group"><label>Consultation Fee (₹)</label><input id="dFee" type="number" value="${doc?.fee||500}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Experience (years)</label><input id="dExp" type="number" value="${doc?.experience||1}"></div>
      <div class="form-group"><label>Rating</label><input id="dRating" type="number" step="0.1" max="5" value="${doc?.rating||4.5}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input id="dEmail" type="email" value="${doc?.email||''}"></div>
      <div class="form-group"><label>UPI ID</label><input id="dUpi" value="${doc?.upiId||''}"></div>
    </div>
    <div class="form-group"><label>Photo URL</label><input id="dPhoto" value="${doc?.photo||''}"></div>
    <div class="form-group"><label>Bio</label><textarea id="dBio">${doc?.bio||''}</textarea></div>
    <div class="form-group"><label>Time Slots (comma-separated)</label><input id="dSlots" value="${doc?.slots?.join(',')||'09:00,10:00,11:00,14:00,15:00'}"></div>
    <div class="form-group"><label>Available</label><select id="dAvail"><option value="true" ${doc?.available?'selected':''}>Yes</option><option value="false" ${!doc?.available?'selected':''}>No</option></select></div>`;
  document.getElementById('modalFoot').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveDoctor('${doc?._id||''}')"><i class="fas fa-save"></i> ${isEdit?'Update':'Add'} Doctor</button>`;
  openModal();
}

async function saveDoctor(id) {
  const payload = {
    name: document.getElementById('dName').value,
    specialty: document.getElementById('dSpec').value,
    hospital: document.getElementById('dHosp').value,
    fee: +document.getElementById('dFee').value,
    experience: +document.getElementById('dExp').value,
    rating: +document.getElementById('dRating').value,
    email: document.getElementById('dEmail').value,
    upiId: document.getElementById('dUpi').value,
    photo: document.getElementById('dPhoto').value,
    bio: document.getElementById('dBio').value,
    slots: document.getElementById('dSlots').value.split(',').map(s=>s.trim()).filter(Boolean),
    available: document.getElementById('dAvail').value === 'true'
  };
  try {
    if (id) await api('PUT',`/admin/doctors/${id}`, payload);
    else await api('POST','/admin/doctors', payload);
    closeModal(); showView('doctors');
  } catch(err) { alert(err.message); }
}

async function deleteDoctor(id) {
  if (!confirm('Delete this doctor?')) return;
  await api('DELETE',`/admin/doctors/${id}`);
  showView('doctors');
}

// ── Medicines ─────────────────────────────────────────────
async function renderMedicines() {

async function saveScheme(id) {
  const fd = new FormData();
  fd.append('name',        document.getElementById('sName').value.trim());
  fd.append('description', document.getElementById('sDesc').value.trim());
  fd.append('longDesc',    document.getElementById('sLong').value.trim());
  fd.append('category',    document.getElementById('sCat').value);
  fd.append('eligibility', document.getElementById('sElig').value.trim());
  fd.append('benefits',    document.getElementById('sBen').value.trim());
  fd.append('applyLink',   document.getElementById('sLink').value.trim());
  if (id) fd.append('isActive', document.getElementById('sActive').value);
  const imgFile = document.getElementById('sImg').files[0];
  if (imgFile) fd.append('image', imgFile);

  if (!fd.get('name') || !fd.get('description')) { alert('Name and description are required'); return; }

  const method = id ? 'PUT' : 'POST';
  const url    = id ? `/api/admin/schemes/${id}` : '/api/admin/schemes';
  const r = await fetch(url, { method, headers:{ 'Authorization': `Bearer ${TOKEN}` }, body: fd });
  const data = await r.json();
  if (!r.ok) { alert('Error: ' + data.error); return; }
  closeModal();
  showView('schemes');
}

async function deleteScheme(id) {
  if (!confirm('Delete this scheme?')) return;
  await api('DELETE', `/admin/schemes/${id}`);
  showView('schemes');
}

// ── Helpers ───────────────────────────────────────────────
function bc(status) {
  return {confirmed:'b-green',completed:'b-blue',cancelled:'b-red',pending_payment:'b-gold',shipped:'b-blue',delivered:'b-green'}[status]||'b-gray';
}
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function filterTable(tbodyId, search, cols) {
  const rows = document.getElementById(tbodyId)?.querySelectorAll('tr') || [];
  const s = search.toLowerCase();
  rows.forEach(row => {
    const cells = row.querySelectorAll('td');
    const match = cols.some(i => cells[i]?.textContent.toLowerCase().includes(s));
    row.style.display = match ? '' : 'none';
  });
}
function filterTableByCol(tbodyId, val, colIdx) {
  const rows = document.getElementById(tbodyId)?.querySelectorAll('tr') || [];
  rows.forEach(row => {
    if (!val) { row.style.display=''; return; }
    const cell = row.querySelectorAll('td')[colIdx];
    row.style.display = cell?.textContent.includes(val) ? '' : 'none';
  });
}
function doLogout() {
  localStorage.removeItem('am_token'); localStorage.removeItem('am_user');
  window.location.href = '/auth.html';
}
</script>
