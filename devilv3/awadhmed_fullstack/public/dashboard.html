<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AwadhMed — My Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--primary:#1a56c4;--bg:#f4f6fb;--surface:#fff;--text:#1a1a2e;--muted:#9aa5b4;--border:#e8edf5;--error:#e74c3c;--success:#27ae60;--warning:#f59e0b;--sidebar:260px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.layout{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:var(--sidebar);background:#1a1a2e;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.sidebar-brand{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.08)}
.brand-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#9a7530);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:#f5e6a3;font-weight:600}
.brand-sub{font-size:9px;color:rgba(245,230,163,0.5);letter-spacing:2px;text-transform:uppercase}
.user-card{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08)}
.user-avatar{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),#0d3a8f);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;margin-bottom:8px}
.user-name{color:#f5e6a3;font-size:14px;font-weight:600}
.user-role{color:rgba(245,230,163,0.5);font-size:11px;text-transform:uppercase;letter-spacing:1px}
.nav{padding:12px 0;flex:1}
.nav-section{padding:8px 20px 4px;font-size:9px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:2px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;color:rgba(255,255,255,0.6);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left;text-decoration:none}
.nav-item i{width:18px;text-align:center;font-size:14px}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff}
.nav-item.active{background:rgba(26,86,196,0.25);color:#fff;border-left:3px solid var(--primary)}
.nav-item.danger{color:rgba(245,90,90,0.7)}
.nav-item.danger:hover{background:rgba(245,90,90,0.1);color:#f55a5a}
/* Main */
.main{margin-left:var(--sidebar);flex:1;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:18px;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-btn{border:1.5px solid var(--border);background:#fff;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--muted);font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;text-decoration:none}
.topbar-btn:hover{border-color:var(--primary);color:var(--primary)}
.content{padding:28px}
/* Cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:16px;padding:22px;border:1px solid var(--border);display:flex;align-items:center;gap:16px}
.stat-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px}
.stat-icon.blue{background:#e8f0fe;color:var(--primary)}
.stat-icon.gold{background:#fff8e1;color:var(--gold)}
.stat-icon.green{background:#e6f9f0;color:var(--success)}
.stat-icon.red{background:#fef0f0;color:var(--error)}
.stat-num{font-size:26px;font-weight:700;color:var(--text);line-height:1}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:3px}
/* Sections */
.section{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:24px}
.section-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:16px;font-weight:700}
.section-body{padding:24px}
/* Table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left}
.data-table td{padding:13px 14px;border-bottom:1px solid #f5f7fb;font-size:13px}
.data-table tr:last-child td{border:none}
.data-table tr:hover td{background:#fafbff}
/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:#e8f0fe;color:var(--primary)}
.badge-green{background:#e6f9f0;color:var(--success)}
.badge-gold{background:#fff8e1;color:#9a7530}
.badge-red{background:#fef0f0;color:var(--error)}
.badge-gray{background:#f5f7fb;color:var(--muted)}
/* Buttons */
.btn{border:none;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--primary),#0d3a8f);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,86,196,0.3)}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:#fef0f0;color:var(--error);border:1px solid #fcc}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-head{padding:24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}
.modal-body{padding:24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end}
/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;letter-spacing:0.03em;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;background:#fff;color:var(--text)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:80px}
/* UPI Payment */
.upi-box{background:linear-gradient(135deg,#1a1a2e,#1a56c4);border-radius:16px;padding:28px;text-align:center;color:#fff;margin:20px 0}
.upi-amount{font-size:36px;font-weight:700;color:var(--gold)}
.upi-id{font-size:16px;margin:12px 0;font-weight:600}
.upi-note{font-size:12px;opacity:.7;margin-bottom:20px}
.upi-qr{width:160px;height:160px;background:#fff;border-radius:12px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#333}
.upi-apps{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.upi-app-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.upi-app-btn:hover{background:rgba(255,255,255,0.2)}
/* Doctor cards */
.doctor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.doctor-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .2s}
.doctor-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 32px rgba(26,86,196,0.1)}
.doc-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--border)}
.doc-fee{font-size:18px;font-weight:700;color:var(--primary)}
.doc-slots{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.slot-btn{padding:5px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:#fff;transition:all .2s}
.slot-btn:hover,.slot-btn.selected{border-color:var(--primary);background:#e8f0fe;color:var(--primary)}
/* Medicine cards */
.med-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.med-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px;transition:all .2s}
.med-card:hover{border-color:var(--primary)}
.med-emoji{font-size:32px;margin-bottom:8px}
.med-name{font-size:14px;font-weight:700}
.med-brand{font-size:12px;color:var(--muted)}
.med-price{font-size:18px;font-weight:700;color:var(--primary);margin:6px 0}
/* Cart */
.cart-badge{background:var(--error);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-left:4px}
/* Responsive */
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:none}.main{margin-left:0}.form-row{grid-template-columns:1fr}.mob-toggle{display:flex!important}}
.mob-toggle{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
.mob-overlay.open{display:block}
/* Alerts */
.alert{padding:14px 18px;border-radius:12px;font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.alert-info{background:#e8f0fe;color:var(--primary);border:1px solid #c2d4f8}
.alert-success{background:#e6f9f0;color:var(--success);border:1px solid #a3e6c5}
.alert-error{background:#fef0f0;color:var(--error);border:1px solid #fcc}
/* Blog */
.blog-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:22px;cursor:pointer;transition:all .2s}
.blog-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 6px 24px rgba(26,86,196,0.08)}
</style>
</head>
<body>
<div id="mobOverlay" class="mob-overlay" onclick="toggleSidebar()"></div>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="/" class="brand-logo">
        <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
        <div><div class="brand-name">AwadhMed</div><div class="brand-sub">Healthcare</div></div>
      </a>
    </div>
    <div class="user-card">
      <div class="user-avatar" id="sideUserAvatar">?</div>
      <div class="user-name" id="sideUserName">Loading…</div>
      <div class="user-role" id="sideUserRole">—</div>
    </div>
    <nav class="nav" id="sideNav"></nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="mob-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div class="page-title" id="pageTitle">Dashboard</div>
      </div>
      <div class="topbar-right">
        <a href="/" class="topbar-btn"><i class="fas fa-home"></i> Home</a>
        <button class="topbar-btn" id="cartBtn" onclick="showView('cart')" style="display:none"><i class="fas fa-shopping-cart"></i> Cart <span class="cart-badge" id="cartCount">0</span></button>
        <button class="topbar-btn" onclick="doLogout()" style="color:#e74c3c;border-color:#fcc"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Booking Modal -->
<div class="modal-overlay" id="bookingModal">
  <div class="modal">
    <div class="modal-head"><h3 id="bookingModalTitle">Book Appointment</h3><button class="modal-close" onclick="closeModal('bookingModal')">×</button></div>
    <div class="modal-body" id="bookingModalBody"></div>
  </div>
</div>

<!-- UPI Payment Modal -->
<div class="modal-overlay" id="upiModal">
  <div class="modal">
    <div class="modal-head"><h3>Complete Payment</h3><button class="modal-close" onclick="closeModal('upiModal')">×</button></div>
    <div class="modal-body" id="upiModalBody"></div>
  </div>
</div>

<!-- Blog Read Modal -->
<div class="modal-overlay" id="blogModal">
  <div class="modal" style="max-width:700px">
    <div class="modal-head"><h3 id="blogModalTitle">Blog Post</h3><button class="modal-close" onclick="closeModal('blogModal')">×</button></div>
    <div class="modal-body" id="blogModalBody"></div>
  </div>
</div>

<script>
// ─── State ─────────────────────────────────────────
let USER = null, TOKEN = null, CART = [], currentView = 'overview';
let pendingBooking = null, pendingOrder = null;

// ─── Init ───────────────────────────────────────────
(async function init() {
  TOKEN = localStorage.getItem('am_token');
  USER  = JSON.parse(localStorage.getItem('am_user') || 'null');
  if (!TOKEN || !USER) return window.location.href = '/auth.html';
  renderSidebar();
  showView('overview');
})();

function renderSidebar() {
  document.getElementById('sideUserName').textContent = USER.name;
  document.getElementById('sideUserRole').textContent = USER.role.toUpperCase();
  document.getElementById('sideUserAvatar').textContent = USER.name[0].toUpperCase();
  if (USER.role === 'patient') document.getElementById('cartBtn').style.display = 'flex';

  const patientNav = `
    <div class="nav-section">Overview</div>
    <button class="nav-item active" data-view="overview" onclick="showView('overview')"><i class="fas fa-th-large"></i> Dashboard</button>
    <div class="nav-section">Healthcare</div>
    <button class="nav-item" data-view="find-doctors" onclick="showView('find-doctors')"><i class="fas fa-user-md"></i> Find Doctors</button>
    <button class="nav-item" data-view="medicines" onclick="showView('medicines')"><i class="fas fa-pills"></i> Order Medicines</button>
    <div class="nav-section">My Records</div>
    <button class="nav-item" data-view="my-bookings" onclick="showView('my-bookings')"><i class="fas fa-calendar-check"></i> My Appointments</button>
    <button class="nav-item" data-view="my-orders" onclick="showView('my-orders')"><i class="fas fa-shopping-bag"></i> My Orders</button>
    <div class="nav-section">Explore</div>
    <button class="nav-item" data-view="blog" onclick="showView('blog')"><i class="fas fa-blog"></i> Health Blog</button>
    <div class="nav-section">Account</div>
    <button class="nav-item" data-view="profile" onclick="showView('profile')"><i class="fas fa-user-cog"></i> My Profile</button>
    <button class="nav-item danger" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>`;

  const doctorNav = `
    <div class="nav-section">Overview</div>
    <button class="nav-item active" data-view="overview" onclick="showView('overview')"><i class="fas fa-th-large"></i> Dashboard</button>
    <div class="nav-section">Appointments</div>
    <button class="nav-item" data-view="appointments" onclick="showView('appointments')"><i class="fas fa-calendar-alt"></i> My Appointments</button>
    <div class="nav-section">Explore</div>
    <button class="nav-item" data-view="blog" onclick="showView('blog')"><i class="fas fa-blog"></i> Health Blog</button>
    <div class="nav-section">Account</div>
    <button class="nav-item" data-view="profile" onclick="showView('profile')"><i class="fas fa-user-cog"></i> My Profile</button>
    <button class="nav-item danger" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>`;

  document.getElementById('sideNav').innerHTML = USER.role === 'doctor' ? doctorNav : patientNav;
}

function setActiveNav(view) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  document.getElementById('pageTitle').textContent = {
    overview:'Dashboard', 'find-doctors':'Find Doctors', medicines:'Order Medicines',
    'my-bookings':'My Appointments', 'my-orders':'My Orders', blog:'Health Blog',
    profile:'My Profile', appointments:'My Appointments', cart:'Shopping Cart'
  }[view] || 'Dashboard';
}

async function showView(view) {
  currentView = view;
  setActiveNav(view);
  const content = document.getElementById('content');
  content.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)"><i class="fas fa-circle-notch fa-spin" style="font-size:28px"></i></div>';
  try {
    switch(view) {
      case 'overview':       await renderOverview(); break;
      case 'find-doctors':   await renderFindDoctors(); break;
      case 'medicines':      await renderMedicines(); break;
      case 'my-bookings':    await renderMyBookings(); break;
      case 'my-orders':      await renderMyOrders(); break;
      case 'blog':           await renderBlog(); break;
      case 'profile':        renderProfile(); break;
      case 'appointments':   await renderDoctorAppointments(); break;
      case 'cart':           renderCart(); break;
    }
  } catch(err) {
    content.innerHTML = `<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Failed to load: ${err.message}</div>`;
  }
}

// ─── API Helper ──────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch(`/api${path}`, {
    method, headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${TOKEN}` },
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ─── Overview ────────────────────────────────────────
async function renderOverview() {
  let stats = {};
  if (USER.role === 'patient') {
    const [bookings, orders] = await Promise.all([
      api('GET','/bookings/my').catch(()=>[]),
      api('GET','/orders/my').catch(()=>[])
    ]);
    stats = {
      totalBookings: bookings.length,
      confirmedBookings: bookings.filter(b=>b.status==='confirmed').length,
      totalOrders: orders.length,
      pendingOrders: orders.filter(o=>['confirmed','shipped'].includes(o.status)).length
    };
    document.getElementById('content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-calendar-check"></i></div><div><div class="stat-num">${stats.totalBookings}</div><div class="stat-lbl">Total Appointments</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div><div class="stat-num">${stats.confirmedBookings}</div><div class="stat-lbl">Confirmed</div></div></div>
      <div class="stat-card"><div class="stat-icon gold"><i class="fas fa-shopping-bag"></i></div><div><div class="stat-num">${stats.totalOrders}</div><div class="stat-lbl">Medicine Orders</div></div></div>
      <div class="stat-card"><div class="stat-icon red"><i class="fas fa-truck"></i></div><div><div class="stat-num">${stats.pendingOrders}</div><div class="stat-lbl">Active Orders</div></div></div>
    </div>
    <div class="section">
      <div class="section-head"><span class="section-title">Recent Appointments</span><button class="btn btn-outline btn-sm" onclick="showView('my-bookings')">View All</button></div>
      <div class="section-body">
        ${bookings.slice(0,5).map(b => `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f5f7fb">
          <div><div style="font-weight:600;font-size:14px">${b.doctorName}</div><div style="font-size:12px;color:var(--muted)">${b.date} at ${b.slot}</div></div>
          <span class="badge ${badgeClass(b.status)}">${b.status}</span>
        </div>`).join('') || '<p style="color:var(--muted);text-align:center;padding:20px">No appointments yet. <a href="#" onclick="showView(\'find-doctors\')" style="color:var(--primary)">Book one now!</a></p>'}
      </div>
    </div>`;
  } else {
    const appts = await api('GET','/bookings/doctor/mine').catch(()=>[]);
    document.getElementById('content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-calendar-alt"></i></div><div><div class="stat-num">${appts.length}</div><div class="stat-lbl">Total Appointments</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div><div class="stat-num">${appts.filter(a=>a.status==='completed').length}</div><div class="stat-lbl">Completed</div></div></div>
      <div class="stat-card"><div class="stat-icon gold"><i class="fas fa-rupee-sign"></i></div><div><div class="stat-num">₹${appts.filter(a=>a.status==='completed').reduce((s,a)=>s+a.amount,0)}</div><div class="stat-lbl">Total Earned</div></div></div>
      <div class="stat-card"><div class="stat-icon red"><i class="fas fa-clock"></i></div><div><div class="stat-num">${appts.filter(a=>a.status==='confirmed').length}</div><div class="stat-lbl">Upcoming</div></div></div>
    </div>
    <div class="section">
      <div class="section-head"><span class="section-title">Upcoming Appointments</span></div>
      <div class="section-body">

function selectSlot(btn, slot) {
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));

  window._selectedSlot = slot;
}

async function initiateBooking(doctorId) {
  const date     = document.getElementById('bookDate').value;
  const slot     = window._selectedSlot;
  const symptoms = document.getElementById('symptoms').value;
  if (!date) return alert('Please select a date.');
  if (!slot) return alert('Please select a time slot.');
  try {
    const result = await api('POST','/bookings/initiate',{ doctorId, date, slot, symptoms });
    pendingBooking = result;
    closeModal('bookingModal');
    showUpiModal(result.payment, 'booking', result.booking._id);
  } catch(err) {
    alert(err.message);
  }
}

// ─── UPI Modal ─────────────────────────────────────────
function showUpiModal(payment, type, refId) {
  const { upiId, upiName, amount, transactionRef, upiString } = payment;
  const gpayUrl = `gpay://upi/pay?pa=${upiId}&pn=${encodeURIComponent(upiName)}&am=${amount}&cu=INR`;
  const phonepeUrl = `phonepe://pay?pa=${upiId}&pn=${encodeURIComponent(upiName)}&am=${amount}&cu=INR`;
  const paytmUrl = `paytmmp://pay?pa=${upiId}&pn=${encodeURIComponent(upiName)}&am=${amount}&cu=INR`;

  document.getElementById('upiModalBody').innerHTML = `
    <div class="upi-box">
      <div style="font-size:13px;opacity:.7;margin-bottom:4px">Amount to Pay</div>
      <div class="upi-amount">₹${amount}</div>
      <div class="upi-id"><i class="fas fa-university"></i> ${upiId}</div>
      <div class="upi-note">Ref: ${transactionRef} · Pay to complete your ${type === 'booking' ? 'appointment' : 'order'}</div>
      <div class="upi-qr" id="qrHolder"><i class="fas fa-qrcode" style="font-size:48px;color:#ccc"></i><br><span>Scan with any UPI app</span></div>
      <div class="upi-apps">
        <a href="${gpayUrl}" class="upi-app-btn"><i class="fas fa-google"></i> GPay</a>
        <a href="${phonepeUrl}" class="upi-app-btn"><i class="fas fa-mobile-alt"></i> PhonePe</a>
        <a href="${paytmUrl}" class="upi-app-btn"><i class="fas fa-wallet"></i> Paytm</a>
        <a href="${upiString}" class="upi-app-btn"><i class="fas fa-link"></i> Any UPI</a>
      </div>
    </div>
    <div style="margin-top:20px">
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px;text-align:center">After payment, enter the <strong>UPI Transaction ID</strong> or reference number to confirm:</p>
      <div class="form-group">
        <label>UPI Transaction Reference</label>
        <input type="text" id="upiRefInput" placeholder="e.g. 425678901234 or T2024XXXXXX" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;outline:none">
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline" style="flex:1" onclick="closeModal('upiModal')">Cancel</button>
        <button class="btn btn-primary" style="flex:2" onclick="confirmPayment('${type}','${refId}')"><i class="fas fa-check-circle"></i> Confirm Payment</button>
      </div>
    </div>`;
  
  // Try to load QR via API
  loadQR(upiString);
  openModal('upiModal');
}

function loadQR(upiString) {
  const qrImg = document.createElement('img');
  qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(upiString)}`;
  qrImg.style.cssText = 'width:160px;height:160px;border-radius:8px';
  qrImg.onload = () => { const h = document.getElementById('qrHolder'); if(h) h.innerHTML=''; if(h) h.appendChild(qrImg); };
}

async function confirmPayment(type, refId) {
  const upiRef = document.getElementById('upiRefInput').value.trim();
  if (!upiRef) return alert('Please enter the UPI transaction reference.');
  try {
    let result;
    if (type === 'booking') {
      result = await api('POST',`/bookings/${refId}/confirm`, { upiRef });
      alert(`✅ Appointment confirmed! Check your email for details.\nBooking ID: #${result.booking._id.slice(-8).toUpperCase()}`);
    } else {
      result = await api('POST',`/orders/${refId}/confirm`, { upiRef });
      alert(`✅ Order confirmed! Your medicines will be delivered in 2-4 hours.\nOrder ID: #${result.order._id.slice(-8).toUpperCase()}`);
      CART = [];
      updateCartBadge();
    }
    closeModal('upiModal');
    showView(type === 'booking' ? 'my-bookings' : 'my-orders');
  } catch(err) {
    alert('Error: ' + err.message);
  }
}

}

function renderMedCards(meds) {
  if (!meds.length) return '<p style="color:var(--muted);text-align:center;padding:40px;grid-column:1/-1">No medicines found.</p>';
  return meds.map(m => `
    <div class="med-card">
      <div class="med-emoji">${m.image || '💊'}</div>
      <div class="med-name">${m.name}</div>
      <div class="med-brand">${m.brand} · ${m.category}</div>
      <div style="font-size:11px;color:var(--muted);margin:4px 0">${m.description||''}</div>
      <div class="med-price">₹${m.price}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="cartQty('${m._id}',-1)">−</button>
        <span id="qty_${m._id}" style="font-weight:700;min-width:24px;text-align:center">0</span>
        <button class="btn btn-outline btn-sm" onclick="cartQty('${m._id}',1)">+</button>
        <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="addToCart('${m._id}')"><i class="fas fa-plus"></i> Add</button>
      </div>
    </div>`).join('');
}

function filterMeds() {
  const s = document.getElementById('medSearch').value.toLowerCase();
  const c = document.getElementById('catFilter').value;
  let filtered = window._allMeds || [];
  if (c !== 'All') filtered = filtered.filter(m => m.category === c);
  if (s) filtered = filtered.filter(m => m.name.toLowerCase().includes(s) || m.brand.toLowerCase().includes(s));
  document.getElementById('medGrid').innerHTML = renderMedCards(filtered);
  updateMedQtyDisplay();
}

function cartQty(id, delta) {
  const idx = CART.findIndex(i => i.medicineId === id);
  if (delta === 1) {
    if (idx >= 0) CART[idx].qty++;
    else CART.push({ medicineId: id, qty: 1 });
  } else if (delta === -1 && idx >= 0) {
    CART[idx].qty--;
    if (CART[idx].qty <= 0) CART.splice(idx, 1);
  }
  updateMedQtyDisplay(); updateCartBadge();
}

function addToCart(id) { cartQty(id, 1); updateMedCart(); }

function updateMedQtyDisplay() {
  CART.forEach(item => {
    const el = document.getElementById(`qty_${item.medicineId}`);
    if (el) el.textContent = item.qty;
  });
}

function updateMedCart() {
  updateMedQtyDisplay();
  const section = document.getElementById('checkoutSection');
  const preview = document.getElementById('cartPreview');
  if (!section || !preview) return;
  if (CART.length === 0) { section.style.display='none'; return; }
  section.style.display = '';
  const meds = window._allMeds || [];
  let html = '', total = 0;
  CART.forEach(item => {
    const m = meds.find(x => x._id === item.medicineId);
    if (!m) return;
    const sub = m.price * item.qty;
    total += sub;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f7fb">
      <span>${m.name} × ${item.qty}</span><span style="font-weight:700">₹${sub}</span>
    </div>`;
  });
  const delivery = total >= 500 ? 0 : 40;
  html += `<div style="display:flex;justify-content:space-between;padding:8px 0;color:var(--muted)"><span>Delivery</span><span>${delivery===0?'<span style="color:var(--success)">FREE</span>':'₹'+delivery}</span></div>`;
  html += `<div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:700;font-size:16px"><span>Total</span><span style="color:var(--primary)">₹${total+delivery}</span></div>`;
  preview.innerHTML = html;
}

async function proceedToCheckout() {
  if (!CART.length) return alert('Your cart is empty');
  const address = prompt('Enter delivery address (Lucknow):');
  if (!address) return;
  try {
    const result = await api('POST','/orders/initiate',{ items: CART, address });
    closeModal('upiModal');
    showUpiModal(result.payment, 'order', result.order._id);
  } catch(err) { alert(err.message); }
}

function updateCartBadge() {
  const total = CART.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').textContent = total;
}

// ─── Cart View ──────────────────────────────────────────
function renderCart() {
  const meds = window._allMeds || [];
  if (!CART.length) {
    document.getElementById('content').innerHTML = `<div class="section"><div class="section-body" style="text-align:center;padding:60px"><i class="fas fa-shopping-cart" style="font-size:48px;color:var(--muted);margin-bottom:16px"></i><p style="color:var(--muted)">Your cart is empty.</p><button class="btn btn-primary" style="margin-top:16px" onclick="showView('medicines')">Browse Medicines</button></div></div>`;
    return;
  }
  let html = '<div class="section"><div class="section-head"><span class="section-title">Shopping Cart</span></div><div class="section-body">', total = 0;
  CART.forEach(item => {
    const m = meds.find(x=>x._id===item.medicineId);
    if (!m) return;
    const sub = m.price * item.qty;
    total += sub;
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)">
      <div><div style="font-weight:600">${m.name}</div><div style="font-size:12px;color:var(--muted)">₹${m.price} each</div></div>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn btn-outline btn-sm" onclick="cartQty('${m._id}',-1);renderCart()">−</button>
        <span style="font-weight:700">${item.qty}</span>
        <button class="btn btn-outline btn-sm" onclick="cartQty('${m._id}',1);renderCart()">+</button>
        <span style="font-weight:700;color:var(--primary);min-width:60px;text-align:right">₹${sub}</span>
      </div>
    </div>`;
  });
  const delivery = total>=500?0:40;
  html += `<div style="padding:16px 0;display:flex;justify-content:space-between;font-size:15px;font-weight:700"><span>Total (incl. delivery)</span><span style="color:var(--primary)">₹${total+delivery}</span></div>`;
  html += `<button class="btn btn-primary" style="width:100%" onclick="proceedToCheckout()"><i class="fas fa-lock"></i> Checkout with UPI ₹${total+delivery}</button>`;
  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

        <div class="section-head"><span class="section-title">Personal Information</span></div>
        <div class="section-body">
          <div class="form-group"><label>Full Name</label><input type="text" id="pName" value="${USER.name}"></div>
          <div class="form-group"><label>Email</label><input type="email" value="${USER.email}" disabled style="background:#f5f7fb;color:var(--muted)"></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="pPhone" value="${USER.phone||''}"></div>
          <div class="form-group"><label>Address</label><input type="text" id="pAddress" value="${USER.address||''}"></div>
          <button class="btn btn-primary" onclick="saveProfile()"><i class="fas fa-save"></i> Save Changes</button>
        </div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">Change Password</span></div>
        <div class="section-body">
          <div class="form-group"><label>Current Password</label><input type="password" id="cpw1"></div>
          <div class="form-group"><label>New Password</label><input type="password" id="cpw2"></div>
          <div class="form-group"><label>Confirm New Password</label><input type="password" id="cpw3"></div>
          <button class="btn btn-outline" onclick="changePassword()"><i class="fas fa-lock"></i> Update Password</button>
        </div>
      </div>
    </div>`;
}

async function saveProfile() {
  const name = document.getElementById('pName').value;
  const phone = document.getElementById('pPhone').value;
  const address = document.getElementById('pAddress').value;
  try {
    const updated = await api('PUT','/auth/profile',{ name, phone, address });
    USER = { ...USER, ...updated };
    localStorage.setItem('am_user', JSON.stringify(USER));
    document.getElementById('sideUserName').textContent = USER.name;
    alert('✅ Profile updated!');
  } catch(err) { alert(err.message); }
}

async function changePassword() {
  const cp = document.getElementById('cpw1').value;
  const np = document.getElementById('cpw2').value;
  const np2 = document.getElementById('cpw3').value;
  if (np !== np2) return alert('New passwords do not match.');
  if (np.length < 6) return alert('Password must be at least 6 characters.');
  try {
    await api('PUT','/auth/change-password',{ currentPassword: cp, newPassword: np });
    alert('✅ Password changed!');
    ['cpw1','cpw2','cpw3'].forEach(id => document.getElementById(id).value = '');
  } catch(err) { alert(err.message); }
}

// ─── Doctor Appointments ──────────────────────────────
async function renderDoctorAppointments() {
  const appts = await api('GET','/bookings/doctor/mine');
  document.getElementById('content').innerHTML = `
    <div class="section">
      <div class="section-head"><span class="section-title">My Appointments</span></div>
      <div class="section-body" style="padding:0">
        <table class="data-table">
          <thead><tr><th>Patient</th><th>Date & Time</th><th>Symptoms</th><th>Fee</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${appts.map(a=>`<tr>
              <td><div style="font-weight:600">${a.patientName}</div><div style="font-size:11px;color:var(--muted)">${a.patientEmail}</div></td>
              <td>${a.date}<br><span style="font-size:11px;color:var(--muted)">${a.slot}</span></td>
              <td style="font-size:12px;max-width:120px">${a.symptoms||'—'}</td>
              <td style="font-weight:700;color:var(--primary)">₹${a.amount}</td>
              <td><span class="badge ${badgeClass(a.status)}">${a.status}</span></td>
              <td>${a.status==='confirmed'?`<button class="btn btn-primary btn-sm" onclick="updateBookingStatus('${a._id}','completed')">Complete</button> <button class="btn btn-outline btn-sm" onclick="updateBookingStatus('${a._id}','cancelled')" style="color:var(--error)">Cancel</button>`:'—'}</td>
            </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:40px">No appointments yet.</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
}

async function updateBookingStatus(id, status) {
  if (!confirm(`Mark as ${status}?`)) return;
  try { await api('PUT',`/bookings/${id}/status`,{ status }); showView(USER.role==='doctor'?'appointments':'my-bookings'); }
  catch(err) { alert(err.message); }
}

// ─── Helpers ────────────────────────────────────────────
function badgeClass(status) {
  return { confirmed:'badge-green', completed:'badge-blue', cancelled:'badge-red', pending_payment:'badge-gold', shipped:'badge-blue', delivered:'badge-green' }[status] || 'badge-gray';
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobOverlay').classList.toggle('open');
}
function doLogout() {
  localStorage.removeItem('am_token'); localStorage.removeItem('am_user');
  window.location.href = '/auth.html';
}
</script>
</body>
</html>
